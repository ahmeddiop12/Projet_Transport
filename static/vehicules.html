<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TranspoBot — Flotte de véhicules</title>
  <link rel="icon" href="logo.jfif">
  <link rel="stylesheet" href="static/css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
</head>

<body>

   <header>
    <a href="/" class="header-brand">
      <span class="logo">🚌</span>
      <div>
        <h1>TranspoBot</h1>
        <small>Assistant IA — Gestion de Transport Urbain</small>
      </div>
    </a>
    <nav class="header-nav">
      <a href="/" class="nav-btn active">📊 Tableau de bord</a>
      <a href="/assistant" class="nav-btn">💬 Assistant IA</a>
      <a href="/vehicules-page" class="nav-btn">🚌 Véhicules</a>
      <a href="/chauffeurs-page" class="nav-btn">👤 Chauffeurs</a>
      <a href="/incidents-page" class="nav-btn">⚠️ Incidents</a>
      <button class="theme-toggle nav-btn" onclick="toggleTheme()" id="theme-btn" title="Changer le thème">🌙</button>
    </nav>
  </header>

  <div class="container">
    <div class="card animate-row" style="margin-bottom: 2.5rem; animation-delay: 0.1s;">
      <div class="card-title">🚙 Répartition par Marque</div>
      <div style="position:relative; height:250px; width:100%; margin: 0 auto;">
        <canvas id="marquesChart"></canvas>
      </div>
    </div>

    <div class="card animate-row" style="animation-delay: 0.2s;">
      <div class="card-title" style="justify-content:space-between">
        <span>🚌 Flotte de véhicules</span>
        <div style="display:flex;gap:0.5rem">
          <button class="sugg-btn" onclick="filterVehicules('')">Tous</button>
          <button class="sugg-btn" onclick="filterVehicules('actif')">Actifs</button>
          <button class="sugg-btn" onclick="filterVehicules('maintenance')">Maintenance</button>
          <button class="sugg-btn" onclick="filterVehicules('hors_service')">Hors service</button>
        </div>
      </div>
      <div class="table-wrap" id="vehicules-table">
        <div class="loading"><span class="spinner"></span> Chargement...</div>
      </div>
    </div>
  </div>

  <script src="static/js/global.js?v=2"></script>
  <script src="static/js/vehicules.js?v=2"></script>
</body>

</html>
