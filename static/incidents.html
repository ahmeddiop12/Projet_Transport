<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TranspoBot — Incidents</title>
  <link rel="icon" href="logo.jfif">
  <link rel="stylesheet" href="css/style.css">
</head>

<body>

  <header>
    <a href="index.html" class="header-brand">
      <span class="logo">🚌</span>
      <div>

      </div>
    </a>
    <nav class="header-nav">
      <a href="index.html" class="nav-btn">📊 Tableau de bord</a>
      <a href="chat.html" class="nav-btn">💬 Assistant IA</a>

  <div class="container">
    <div class="card">

          <button class="sugg-btn" onclick="filterIncidents(true)">Résolus</button>

      <div class="table-wrap" id="incidents-table">
        <div class="loading"><span class="spinner"></span> Chargement...</div>
      </div>

  <script src="js/global.js?v=2"></script>
